<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🟣 Matrix DCL · Team</title>
<meta name="description" content="順番と詳細をご確認ください。ご不明な点があれば、遠慮なくご連絡ください。">
<meta property="og:title" content="🟣 Matrix DCL · Team">
<meta property="og:description" content="順番と詳細をご確認ください。ご不明な点があれば、遠慮なくご連絡ください。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F4F1E8; --surface:#FFFFFF; --ink:#20302A; --muted:#80806F;
    --line:#E5E0D2; --line-soft:#EFEBDF;
    --amber:#C27A2A; --amber-soft:#F4E5CC;
    --pine:#3C5C46; --pine-soft:#E2EBE1;
    --slate:#5E7480; --slate-soft:#E5ECEE;
    --shadow:0 1px 2px rgba(32,48,42,.05), 0 8px 24px rgba(32,48,42,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Zen Kaku Gothic New", system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "PingFang TC", sans-serif; background:var(--bg); color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased}
  .wrap{max-width:840px; margin:0 auto; padding:26px 18px 80px}
  h1{font-family:"Zen Maru Gothic",sans-serif; font-weight:700; font-size:22px; margin:0}
  .topbar{display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap}
  .who{font-size:13px; color:var(--muted); margin-left:auto}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px}
  .card + .card{margin-top:16px}
  label.fl{font-size:12px; color:var(--muted); display:block; margin-bottom:5px}
  input, select, textarea, button{font-family:inherit}
  input[type=email], input[type=text], input[type=date], input[type=number], select, textarea{width:100%; font-size:15px; color:var(--ink); border:1px solid var(--line); border-radius:10px; background:#FCFBF7; padding:10px 12px}
  textarea{resize:vertical; min-height:60px}
  input:focus, select:focus, textarea:focus{outline:2px solid var(--amber); outline-offset:1px; border-color:var(--amber)}
  .btn{font-weight:700; font-size:15px; border:none; border-radius:11px; padding:12px 16px; cursor:pointer; transition:.14s; background:var(--amber); color:#fff}
  .btn:hover{filter:brightness(1.05)}
  .btn.done{background:var(--pine)}
  .btn-ghost{background:#fff; border:1px solid var(--line); color:var(--ink)}
  .btn-ghost:hover{background:var(--line-soft)}
  .btn-sm{font-size:13px; padding:8px 12px; border-radius:9px}
  .row{display:flex; gap:10px; flex-wrap:wrap}
  .msg{background:#DCF2C9; border-radius:4px 16px 16px 16px; padding:14px 15px; font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word; box-shadow:0 1px 1px rgba(0,0,0,.06); min-height:50px}
  .msg:has(.rv-block){white-space:normal}
  .rv-head{text-align:center; margin-bottom:6px; font-size:15px}
  .rv-date{font-weight:700; margin-bottom:10px}
  .rv-block{background:#fff; border-radius:12px; padding:10px 12px; margin-bottom:9px; box-shadow:0 1px 1px rgba(0,0,0,.05)}
  .rv-num{display:inline-block; background:var(--amber); color:#fff; font-weight:700; border-radius:8px; padding:1px 9px; font-size:13px; margin-bottom:6px}
  .rv-ttl{font-weight:700; margin:2px 0 4px}
  .rv-line{margin:3px 0; line-height:1.65; word-break:break-word}
  .rv-stop{margin:6px 0; padding-left:8px; border-left:2px solid var(--amber-soft)}
  .rv-item{margin:2px 0 2px 16px; font-size:13.5px; color:#4a4a3c}
  .rv-foot{margin-top:8px; color:#3a5a45}
  .mapchip{display:inline-block; background:#e7f0fb; color:#2a6dc9; border:1px solid #cfe0f5; border-radius:999px; padding:1px 9px; font-size:12.5px; text-decoration:none; margin-left:4px; white-space:nowrap}
  .hint{font-size:12.5px; color:var(--muted)}
  .err{color:#b04a4a; font-size:13px; margin-top:8px}
  .ok{color:var(--pine); font-size:13px; margin-top:8px}
  .hidden{display:none !important}
  .tabs{display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap}
  .tab{font-size:14px; border:1px solid var(--line); background:#fff; color:var(--ink); padding:9px 14px; border-radius:999px; cursor:pointer}
  .tab.active{background:var(--amber); color:#fff; border-color:var(--amber)}
  .lamp{font-size:24px}
  /* entries */
  .entry{border:1px solid var(--line-soft); border-radius:12px; background:#FCFBF7; padding:10px; margin-bottom:10px}
  .ehead{display:flex; align-items:center; gap:10px; margin-bottom:8px}
  .enum{font-family:"Zen Maru Gothic",sans-serif; font-weight:700; color:var(--amber)}
  .edel{margin-left:auto; border:none; background:var(--slate-soft); color:var(--slate); width:28px; height:28px; border-radius:8px; cursor:pointer}
  .pool{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px}
  .pool button{font-size:12px; border:1px dashed var(--line); background:#fff; color:var(--ink); padding:5px 9px; border-radius:999px; cursor:pointer}
  .pool button:hover{background:var(--amber-soft); border-color:var(--amber); border-style:solid}
  .ehead .typesel{margin-left:6px; font-size:13px; padding:5px 22px 5px 8px; border-radius:8px; width:auto}
  .mini-l{font-size:11.5px; color:var(--muted); margin:8px 0 3px}
  .stopbox{border:1px dashed var(--line); border-radius:10px; padding:8px 10px; margin:6px 0; background:#fff}
  .itemrow{display:flex; gap:6px; margin-bottom:6px}
  .itemrow input{flex:1; min-width:0}
  .miniadd{font-size:12px; color:var(--amber); background:var(--amber-soft); border:none; border-radius:8px; padding:6px 10px; cursor:pointer; margin-top:2px}
  .minidel{border:none; background:var(--slate-soft); color:var(--slate); width:28px; height:28px; border-radius:8px; cursor:pointer; flex:none}
  .add{font-size:13px; color:var(--amber); background:var(--amber-soft); border:none; border-radius:9px; padding:8px 12px; cursor:pointer}
  .mrow{display:flex; gap:8px; align-items:center; margin-bottom:8px}
  .mrow .del{border:none; background:var(--slate-soft); color:var(--slate); width:30px; height:30px; border-radius:8px; cursor:pointer; flex:none}
  .histitem{border:1px solid var(--line-soft); border-radius:12px; padding:12px; margin-bottom:10px; background:#FCFBF7}
  .histitem h4{margin:0 0 6px; font-size:14px}
  details.mini>summary{cursor:pointer; font-size:13px; color:var(--muted); list-style:none}
  details.mini>summary::-webkit-details-marker{display:none}
  .spin{font-size:13px; color:var(--muted)}
  .langseg{position:fixed; top:11px; right:11px; z-index:50; display:inline-flex; gap:2px; background:rgba(255,255,255,.92); backdrop-filter:blur(6px); border:1px solid var(--line); border-radius:999px; padding:3px; box-shadow:var(--shadow)}
  .langseg button{font-family:inherit; font-size:12.5px; font-weight:600; border:none; background:transparent; color:var(--muted); padding:6px 12px; border-radius:999px; cursor:pointer; transition:.15s; white-space:nowrap; line-height:1}
  .langseg button.active{background:var(--amber); color:#fff; box-shadow:0 1px 3px rgba(194,122,42,.4)}
  .langseg button:hover:not(.active){color:var(--ink); background:var(--amber-soft)}
  @media (max-width:520px){ .langseg button{padding:6px 9px; font-size:12px} }
</style>
</head>
<body>
<div id="langSel" class="langseg"><button data-l="en">EN</button><button data-l="ja">日本語</button><button data-l="zh">中文</button></div>
<div class="wrap">

  <!-- ===== AUTH ===== -->
  <div id="authScreen">
    <div class="topbar"><span class="lamp">🟣</span><h1>Matrix DCL</h1></div>
    <div class="card" style="max-width:420px; margin:0 auto">
      <div id="step1">
        <label class="fl" data-i18n="email">メール</label>
        <input type="email" id="email" placeholder="you@gmail.com" autocomplete="email">
        <div style="height:10px"></div>
        <label class="fl" data-i18n="password">パスワード</label>
        <input type="password" id="pw" data-i18n-ph="password" placeholder="パスワード" autocomplete="current-password">
        <div style="height:12px"></div>
        <button class="btn" id="loginBtn" style="width:100%" data-i18n="login">ログイン</button>
        <p class="hint" style="margin-top:12px" data-i18n="loginHint">初回はこのメール＋パスワードで自動的にアカウントが作成されます。管理者に登録された方のみ内容が見られます。</p>
        <div class="err hidden" id="err1"></div>
      </div>
    </div>
  </div>

  <!-- ===== UNAUTHORIZED ===== -->
  <div id="unauthScreen" class="hidden">
    <div class="topbar"><span class="lamp">🔒</span><h1 data-i18n="unauthTitle">アクセス権がありません</h1><span class="who" id="whoU"></span></div>
    <div class="card">
      <p data-i18n="unauthBody">このメールはまだ登録されていません。管理者に連絡してください。</p>
      <button class="btn-ghost btn btn-sm" id="logoutU" data-i18n="logout">ログアウト</button>
    </div>
  </div>

  <!-- ===== STAFF ===== -->
  <div id="staffScreen" class="hidden">
    <div class="topbar"><span class="lamp">📋</span><h1 id="staffHello">本日の作業</h1><span class="who" id="whoS"></span></div>
    <div class="card">
      <div class="hint" id="staffDate" style="margin-bottom:10px"></div>
      <div class="msg" id="staffMsg">読み込み中…</div>
      <p class="hint" style="margin-top:10px" data-i18n="staffNote">※ 本日ぶんのみ表示されます。過去の履歴は表示されません。</p>
      <div style="margin-top:12px"><button class="btn-ghost btn btn-sm" id="reloadS" data-i18n="refresh">更新</button> <button class="btn-ghost btn btn-sm" id="logoutS" data-i18n="logout">ログアウト</button></div>
    </div>
  </div>

  <!-- ===== ADMIN ===== -->
  <div id="adminScreen" class="hidden">
    <div class="topbar"><span class="lamp">🟣</span><h1 data-i18n="adminTitle">Matrix DCL 管理</h1><span class="who" id="whoA"></span></div>
    <div class="tabs">
      <button class="tab active" data-tab="make" data-i18n="tabMake">作成</button>
      <button class="tab" data-tab="hist" data-i18n="tabHist">履歴</button>
      <button class="tab" data-tab="mem" data-i18n="tabMem">メンバー</button>
      <button class="tab" data-tab="set" data-i18n="tabSet">設定</button>
    </div>

    <!-- MAKE -->
    <div id="tab-make">
      <div class="card">
        <div class="row">
          <div style="flex:1; min-width:150px"><label class="fl" data-i18n="date">日付</label><input type="date" id="mDate"></div>
          <div style="flex:1; min-width:150px"><label class="fl" data-i18n="staffSel">担当者</label><select id="mStaff"></select></div>
        </div>
      </div>
      <div class="card">
        <div id="entries"></div>
        <button class="add" id="addEntry" style="width:100%; padding:11px" data-i18n="addEntry">＋ 時間区間を追加（1.0 / 2.0 …）</button>
      </div>
      <div class="card">
        <label class="fl" data-i18n="preview">プレビュー</label>
        <div class="msg" id="preview"></div>
        <div class="row" style="margin-top:12px">
          <button class="btn" id="saveBtn" style="flex:1" data-i18n="save">クラウドに保存</button>
          <button class="btn-ghost btn" id="copyBtn" data-i18n="copyLine">LINE用コピー</button>
          <button class="btn-ghost btn" id="clearBtn" data-i18n="clear">クリア</button>
        </div>
        <div class="ok hidden" id="saveOk" data-i18n="saveOk">保存しました ✓（担当者が今日ログインすると見えます）</div>
        <div class="err hidden" id="saveErr"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="tab-hist" class="hidden">
      <div class="card">
        <div class="row" style="align-items:flex-end">
          <div style="flex:1; min-width:160px"><label class="fl" data-i18n="histPick">日付を選んで履歴を見る</label><input type="date" id="hDate"></div>
          <button class="btn btn-sm" id="hLoad" data-i18n="show">表示</button>
        </div>
      </div>
      <div id="histList"></div>
    </div>

    <!-- MEMBERS -->
    <div id="tab-mem" class="hidden">
      <div class="card">
        <label class="fl" data-i18n="memAdd">メンバー追加（このメールだけがログイン・閲覧できます）</label>
        <div class="row">
          <input type="email" id="newEmail" data-i18n-ph="phEmail" placeholder="staff@gmail.com" style="flex:2; min-width:160px">
          <input type="text" id="newName" data-i18n-ph="phName" placeholder="名前" style="flex:1; min-width:90px">
          <input type="text" id="newNick" data-i18n-ph="phNick" placeholder="ニックネーム" style="flex:1; min-width:90px">
        </div>
        <div style="margin-top:10px"><button class="btn btn-sm" id="addMem" data-i18n="add">追加</button></div>
        <div class="err hidden" id="memErr"></div>
      </div>
      <div class="card">
        <label class="fl" data-i18n="memList">登録メンバー</label>
        <div id="rosterList" class="spin">…</div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="tab-set" class="hidden">
      <div class="card">
        <label class="fl" data-i18n="cfgHeaderL">上ヘッダー行</label>
        <input type="text" id="cfgHeader">
        <div style="height:12px"></div>
        <label class="fl" data-i18n="cfgFooterL">下フッター（複数行可）</label>
        <textarea id="cfgFooter" rows="3"></textarea>
        <div style="height:12px"></div>
        <label class="fl" data-i18n="cfgPoolL">作業ボタン（カンマ区切り）</label>
        <textarea id="cfgPool" rows="2"></textarea>
        <p class="hint" data-i18n="cfgHint">この設定はこの端末に保存されます（あなた専用の入力補助）。</p>
        <div style="margin-top:6px"><button class="btn-ghost btn btn-sm" id="logoutA" data-i18n="logout">ログアウト</button></div>
      </div>
    </div>
  </div>

</div>

function urlSuffix(u){ return (u&&String(u).trim())?(" "+String(u).trim()):""; }
function pushLines(L,s){ (s||"").split("\n").forEach(l=>{ if(l.trim()) L.push(l); }); }
function blockHasContent(e){
  const t=(e&&e.type)||"text";
  if(t==="transport") return !!(e.title||e.from||e.to||e.storage||e.method||e.note);
  if(t==="shopping")  return !!(e.title||e.from||e.carLocation||e.vehicle||e.refuel||(e.stops||[]).some(s=>s.name||(s.items||[]).some(it=>it.name||it.size||it.qty))||e.note);
  return !!(e && e.text && e.text.trim());
}
function blockBody(e){
  const t=(e&&e.type)||"text"; const L=[];
  if(t==="transport"){
    L.push("🚚 "+((e.title&&e.title.trim())||tr("transportTask")));
    if(e.from) L.push(tr("from")+": "+e.from+urlSuffix(e.fromUrl));
    if(e.to) L.push(tr("to")+": "+e.to+urlSuffix(e.toUrl));
    if(e.storage) L.push(tr("storage")+": "+e.storage+urlSuffix(e.storageUrl));
    if(e.method) L.push(tr("method")+": "+dispCode(e.method));
    pushLines(L, e.note);
  } else if(t==="shopping"){
    L.push("🛒 "+tr("shoppingTitle")+((e.title&&e.title.trim())?(" "+e.title.trim()):""));
    if(e.from) L.push(tr("from")+": "+e.from+urlSuffix(e.fromUrl));
    if(e.carLocation) L.push(tr("carLoc")+": "+e.carLocation);
    if(e.vehicle) L.push(tr("vehicle")+": "+dispCode(e.vehicle));
    if(e.refuel) L.push(tr("refuel")+": "+dispCode(e.refuel));
    (e.stops||[]).forEach((s,si)=>{
      if(!(s.name||(s.items||[]).some(it=>it.name||it.size||it.qty))) return;
      const c="①②③④⑤⑥⑦⑧⑨"[si]||((si+1)+".");
      L.push(c+(s.name||"")+urlSuffix(s.url));
      (s.items||[]).forEach(it=>{ const q=it.qty?(/^\d+$/.test(String(it.qty).trim())?it.qty+"個":it.qty):""; const p=[it.name,it.size,q].filter(Boolean); if(p.length) L.push("　・"+p.join(" / ")); });
    });
    pushLines(L, e.note);
  } else {
    pushLines(L, e.text);
  }
  return L;
}
function buildMsg(data, work_date){
  const L=[];
  const header=(data&&data.header)||lcfg.header;
  const footer=(data&&data.footer)!=null?data.footer:lcfg.footer;
  if(header && header.trim()) L.push(header);
  L.push(fmtDate(work_date));
  const blocks=(data&&data.blocks)||[];
  const used=blocks.filter(blockHasContent);
  used.forEach((e,k)=>{ L.push(`${k+1}.0`); blockBody(e).forEach(l=>L.push(l)); L.push(""); });
  (footer||"").split("\n").forEach(l=>L.push(l));
  return L.join("\n");
}
function linkify(text){
  const esc=String(text).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  return esc.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:#2a6dc9;word-break:break-all">$1</a>');
}
function normBlock(b){
  b=b||{}; const t=b.type||"text";
  if(t==="transport") return {type:"transport", title:b.title||"", from:b.from||"", fromUrl:b.fromUrl||"", to:b.to||"", toUrl:b.toUrl||"", storage:b.storage||"", storageUrl:b.storageUrl||"", method:b.method||"", note:b.note||""};
  if(t==="shopping") return {type:"shopping", title:b.title||"", from:b.from||"", fromUrl:b.fromUrl||"", carLocation:b.carLocation||"", vehicle:b.vehicle||"", refuel:b.refuel||"",
    stops:((b.stops&&b.stops.length)?b.stops:[{}]).map(s=>({ name:(s&&s.name)||"", url:(s&&s.url)||"", items:((s&&s.items&&s.items.length)?s.items:[{}]).map(it=>({ name:(it&&it.name)||"", size:(it&&it.size)||"", qty:(it&&it.qty)||"" })) })),
    note:b.note||""};
  return {type:"text", text:b.text||""};
}
function esc2(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function iconForText(line){
  const map=[
    [/清掃|掃除|クリーニング|そうじ/,"🧹"],
    [/退房|チェックアウト|check ?out/i,"🧳"],
    [/チェックイン|check ?in/i,"🔑"],
    [/チェック|点検|確認|検査|check/i,"✅"],
    [/搬運|運搬|搬入|運ぶ|搬出/,"🚚"],
    [/買い出し|購入|採購|仕入/,"🛒"],
    [/ゴミ|ごみ/,"🗑️"],
    [/洗浄|洗い|洗う/,"🧽"],
    [/BBQ|バーベキュー/i,"🍖"],
    [/事務所|オフィス|office/i,"🗄️"],
    [/鍵|カギ/,"🔑"],
    [/写真|撮影|photo/i,"📷"],
    [/Glamping|グランピング|Sankando|山間堂|New ?land|新土地|CUBE|月江苑|oginohouse|villa/i,"🏠"],
  ];
  for(const [re,ic] of map){ if(re.test(line)) return ic; }
  return "";
}
function richInline(t){
  return esc2(t).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" class="mapchip">🗺️ 地図</a>');
}
function mapChip(url){ if(!url||!String(url).trim()) return ""; return ` <a href="${esc2(String(url).trim())}" target="_blank" rel="noopener" class="mapchip">${tr("mapBtn")}</a>`; }
function rvRow(icon,label,val,url){ return `<div class="rv-line">${icon} <b>${label}</b>：${esc2(val)}${mapChip(url)}</div>`; }
function blockRich(e){
  const t=(e&&e.type)||"text"; let s="";
  if(t==="transport"){
    s+=`<div class="rv-ttl">🚚 ${esc2((e.title&&e.title.trim())||tr("transportTask"))}</div>`;
    if(e.from) s+=rvRow("📍",tr("from"),e.from,e.fromUrl);
    if(e.to) s+=rvRow("🏁",tr("to"),e.to,e.toUrl);
    if(e.storage) s+=rvRow("📦",tr("storage"),e.storage,e.storageUrl);
    if(e.method) s+=rvRow("🛠️",tr("method"),dispCode(e.method));
    (e.note||"").split("\n").forEach(l=>{ if(l.trim()) s+=`<div class="rv-line">📝 ${richInline(l)}</div>`; });
  } else if(t==="shopping"){
    s+=`<div class="rv-ttl">🛒 ${esc2(tr("shoppingTitle"))} ${esc2(e.title||"")}</div>`;
    if(e.from) s+=rvRow("📍",tr("from"),e.from,e.fromUrl);
    if(e.carLocation) s+=rvRow("🅿️",tr("carLoc"),e.carLocation);
    if(e.vehicle) s+=rvRow(e.vehicle==="truck"?"🚚":"🚗",tr("vehicle"),dispCode(e.vehicle));
    if(e.refuel) s+=rvRow("⛽",tr("refuel"),dispCode(e.refuel));
    (e.stops||[]).forEach((st,si)=>{
      if(!(st.name||(st.items||[]).some(it=>it.name||it.size||it.qty))) return;
      const c="①②③④⑤⑥⑦⑧⑨"[si]||((si+1)+".");
      s+=`<div class="rv-stop"><div class="rv-line">${c} <b>${esc2(st.name||"")}</b>${mapChip(st.url)}</div>`;
      (st.items||[]).forEach(it=>{ const q=it.qty?(/^\d+$/.test(String(it.qty).trim())?it.qty+"個":it.qty):""; const p=[it.name,it.size,q].filter(Boolean); if(p.length) s+=`<div class="rv-item">🛍️ ${esc2(p.join(" / "))}</div>`; });
      s+=`</div>`;
    });
    (e.note||"").split("\n").forEach(l=>{ if(l.trim()) s+=`<div class="rv-line">📝 ${richInline(l)}</div>`; });
  } else {
    (e.text||"").split("\n").forEach(line=>{ if(!line.trim()) return; const ic=iconForText(line); const pre=(ic && !line.includes(ic))?ic+" ":""; s+=`<div class="rv-line">${pre}${richInline(line)}</div>`; });
  }
  return s;
}
function renderRich(data, work_date){
  const header=(data&&data.header)||lcfg.header;
  const footer=(data&&data.footer)!=null?data.footer:lcfg.footer;
  let h="";
  if(header && header.trim()) h+=`<div class="rv-head">${esc2(header)}</div>`;
  h+=`<div class="rv-date">📅 ${esc2(work_date||"")}</div>`;
  const blocks=(data&&data.blocks)||[];
  const used=blocks.filter(blockHasContent);
  if(!used.length) h+=`<div class="rv-line" style="color:#8a8a7a">${esc2(tr("noContent"))}</div>`;
  used.forEach((e,k)=>{ h+=`<div class="rv-block"><span class="rv-num">${k+1}.0</span>${blockRich(e)}</div>`; });
  if(footer && footer.trim()) h+=`<div class="rv-foot">${esc2(footer).replace(/\n/g,"<br>")}</div>`;
  return h;
}

/* ---------- AUTH (email + password) ---------- */
async function doLogin(){
  const email=q("email").value.trim().toLowerCase();
  const pw=q("pw").value;
  q("err1").classList.add("hidden");
  if(!email || !email.includes("@") || !pw){ q("err1").textContent=tr("eMailPw"); q("err1").classList.remove("hidden"); return; }
  q("loginBtn").disabled=true; q("loginBtn").textContent=tr("loggingIn");
  // 1) 既存アカウントでログイン
  let { error }=await db.auth.signInWithPassword({ email, password:pw });
  if(error){
    // 2) 未作成なら作成を試みる
    const { data:sd, error:e2 }=await db.auth.signUp({ email, password:pw });
    if(e2){
      q("loginBtn").disabled=false; q("loginBtn").textContent=tr("login");
      if(/already|registered|exists/i.test(e2.message)) q("err1").textContent=tr("eWrongPw");
      else if(/rate/i.test(e2.message)) q("err1").textContent=tr("eRate");
      else if(/least|password/i.test(e2.message)) q("err1").textContent=tr("ePwLen");
      else q("err1").textContent=e2.message;
      q("err1").classList.remove("hidden"); return;
    }
    if(!sd || !sd.session){
      q("loginBtn").disabled=false; q("loginBtn").textContent=tr("login");
      q("err1").textContent=tr("eConfirm");
      q("err1").classList.remove("hidden"); return;
    }
  }
  q("loginBtn").disabled=false; q("loginBtn").textContent=tr("login");
  route();
}
q("loginBtn").onclick=doLogin;
q("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
async function logout(){ await db.auth.signOut(); location.reload(); }
["logoutA","logoutS","logoutU"].forEach(id=>{ const el=q(id); if(el) el.onclick=logout; });

/* ---------- ROUTER ---------- */
async function route(){
  const { data:{ session } }=await db.auth.getSession();
  if(!session){ show("authScreen"); return; }
  const email=(session.user.email||"").toLowerCase();
  if(email===ADMIN_EMAIL){ q("whoA").textContent=email; show("adminScreen"); initAdmin(); return; }
  const { data, error }=await db.from("staff_roster").select("*").eq("email", email).maybeSingle();
  if(!error && data && data.active){ q("whoS").textContent=email; show("staffScreen"); initStaff(data); }
  else { q("whoU").textContent=email; show("unauthScreen"); }
}

/* ---------- STAFF ---------- */
async function initStaff(me){
  window._me=me;
  await loadStaffToday();
  q("reloadS").onclick=loadStaffToday;
  applyLang();
}
function renderStaffMsg(){
  const me=window._me||{}; const a=window._staffData;
  q("staffHello").textContent=trf("todayFor",{name:(me.nickname||me.name||"")});
  q("staffDate").textContent=todayStr();
  if(a===undefined) return;
  if(a===null){ q("staffMsg").textContent=tr("noToday"); return; }
  if(a.error){ q("staffMsg").textContent=tr("loadErr")+a.error; return; }
  q("staffMsg").innerHTML=renderRich(a.data, a.work_date);
}
async function loadStaffToday(){
  q("staffMsg").textContent=tr("loading");
  const { data, error }=await db.from("assignments").select("*").order("work_date",{ascending:false}).limit(1);
  if(error){ window._staffData={error:error.message}; renderStaffMsg(); return; }
  window._staffData=(data&&data.length)?data[0]:null;
  renderStaffMsg();
}

/* ---------- ADMIN ---------- */
let entries=[], curStaff="", roster=[];
function seedEntries(){ entries=[{type:"text",text:""},{type:"text",text:""},{type:"text",text:""}]; }

let adminInited=false;
async function initAdmin(){
  if(adminInited) return; adminInited=true;
  // tabs
  document.querySelectorAll(".tab").forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      t.classList.add("active");
      ["make","hist","mem","set"].forEach(n=>q("tab-"+n).classList.toggle("hidden", n!==t.dataset.tab));
      if(t.dataset.tab==="mem") loadRoster();
    };
  });
  q("mDate").value=todayStr();
  q("hDate").value=todayStr();
  seedEntries();
  await loadRoster();
  fillStaffSelect();
  q("mDate").onchange=loadForSelection;
  q("mStaff").onchange=loadForSelection;
  await loadForSelection();
  wireAdminButtons();
  // settings
  q("cfgHeader").value=lcfg.header; q("cfgFooter").value=lcfg.footer; q("cfgPool").value=lcfg.pool.join(", ");
  q("cfgHeader").oninput=()=>{ lcfg.header=q("cfgHeader").value; saveLocal(lcfg); renderPreview(); };
  q("cfgFooter").oninput=()=>{ lcfg.footer=q("cfgFooter").value; saveLocal(lcfg); renderPreview(); };
  q("cfgPool").oninput=()=>{ lcfg.pool=q("cfgPool").value.split(",").map(s=>s.trim()).filter(Boolean); saveLocal(lcfg); renderEntries(); };
  applyLang();
}

function fillStaffSelect(){
  const sel=q("mStaff"); sel.innerHTML="";
  if(!roster.length){ const o=document.createElement("option"); o.value=""; o.textContent=tr("noMember"); sel.appendChild(o); }
  roster.forEach(r=>{ const o=document.createElement("option"); o.value=r.email; o.textContent=(r.nickname||r.name||r.email); sel.appendChild(o); });
  curStaff=sel.value;
}

async function loadForSelection(){
  curStaff=q("mStaff").value;
  const d=q("mDate").value;
  if(!curStaff){ seedEntries(); renderEntries(); renderPreview(); return; }
  const { data }=await db.from("assignments").select("*").eq("work_date", d).eq("staff_email", curStaff).maybeSingle();
  if(data && data.data && Array.isArray(data.data.blocks) && data.data.blocks.length){ entries=data.data.blocks.map(normBlock); }
  else seedEntries();
  renderEntries(); renderPreview();
}

  w.append(mLabel(tr("carLoc")), mText(e.carLocation,"", v=>e.carLocation=v));
  w.append(mLabel(tr("vehicle")), mSelC(e.vehicle,[["",""],["truck","tMTruck"],["car","tVCar"],["other","tMOther"]], v=>e.vehicle=v));
  w.append(mLabel(tr("refuel")), mSelC(e.refuel,[["",""],["no","tRNo"],["yes","tRYes"],["check","tRCheck"]], v=>e.refuel=v));
  const dh=document.createElement("div"); dh.className="mini-l"; dh.style.marginTop="10px"; dh.textContent=tr("dests"); w.appendChild(dh);
  e.stops.forEach((s,si)=>{
    const box=document.createElement("div"); box.className="stopbox";
    const top=document.createElement("div"); top.style.cssText="display:flex;align-items:center;gap:8px;margin-bottom:4px";
    const t=document.createElement("b"); t.style.fontSize="13px"; t.textContent=trf("destOrder",{n:si+1});
    const rm=document.createElement("button"); rm.className="minidel"; rm.textContent="×"; rm.style.marginLeft="auto";
    rm.onclick=()=>{ e.stops.splice(si,1); if(!e.stops.length) e.stops=normBlock({type:"shopping"}).stops; renderEntries(); renderPreview(); };
    top.append(t,rm); box.appendChild(top);
    box.append(mLabel(tr("destName")), mText(s.name,"", v=>s.name=v));
    box.append(mLabel(tr("gmapUrl")), mText(s.url,"https://maps.app...", v=>s.url=v));
    box.appendChild(mLabel(tr("items")));
    s.items.forEach((it,ii)=>{
      const row=document.createElement("div"); row.className="itemrow";
      row.appendChild(mText(it.name,tr("phItem"), v=>it.name=v));
      row.appendChild(mText(it.size,tr("phSize"), v=>it.size=v));
      const qty=mText(it.qty,tr("phQty"), v=>it.qty=v); qty.style.maxWidth="64px"; row.appendChild(qty);
      const d=document.createElement("button"); d.className="minidel"; d.textContent="×";
      d.onclick=()=>{ s.items.splice(ii,1); if(!s.items.length) s.items.push({name:"",size:"",qty:""}); renderEntries(); renderPreview(); };
      row.appendChild(d); box.appendChild(row);
    });
    const ai=document.createElement("button"); ai.className="miniadd"; ai.textContent=tr("addItem"); ai.onclick=()=>{ s.items.push({name:"",size:"",qty:""}); renderEntries(); renderPreview(); };
    box.appendChild(ai); w.appendChild(box);
  });
  const as=document.createElement("button"); as.className="miniadd"; as.textContent=tr("addDest"); as.onclick=()=>{ e.stops.push({name:"",url:"",items:[{name:"",size:"",qty:""}]}); renderEntries(); renderPreview(); };
  w.appendChild(as);
  w.append(mLabel(tr("note")), mArea(e.note,"", v=>e.note=v));
  return w;
}

function renderEntries(){
  const host=q("entries"); host.innerHTML="";
  entries.forEach((e,i)=>{
    if(!e.type) e.type="text";
    const card=document.createElement("div"); card.className="entry";
    const head=document.createElement("div"); head.className="ehead";
    const num=document.createElement("span"); num.className="enum"; num.textContent=(i+1)+".0";
    const typeSel=document.createElement("select"); typeSel.className="typesel";
    [["text","typeText"],["transport","typeTransport"],["shopping","typeShopping"]].forEach(([v,k])=>{ const o=document.createElement("option"); o.value=v; o.textContent=tr(k); if(e.type===v)o.selected=true; typeSel.appendChild(o); });
    typeSel.onchange=()=>{ entries[i]=convertBlock(e, typeSel.value); renderEntries(); renderPreview(); };
    const del=document.createElement("button"); del.className="edel"; del.textContent="×"; del.onclick=()=>{ entries.splice(i,1); renderEntries(); renderPreview(); };
    head.append(num, typeSel, del); card.appendChild(head);
    const body=document.createElement("div");
    if(e.type==="transport") body.appendChild(transportEditor(e));
    else if(e.type==="shopping") body.appendChild(shoppingEditor(e));
    else body.appendChild(textEditor(e));
    card.appendChild(body); host.appendChild(card);
  });
}
function currentData(){ return { blocks:entries, header:lcfg.header, footer:lcfg.footer }; }
function renderPreview(){ q("preview").innerHTML=renderRich(currentData(), q("mDate").value); }

function wireAdminButtons(){
  q("addEntry").onclick=()=>{ entries.push({type:"text",text:""}); renderEntries(); renderPreview(); };
  q("clearBtn").onclick=()=>{ seedEntries(); renderEntries(); renderPreview(); };
  q("copyBtn").onclick=async()=>{
    const text=buildMsg(currentData(), q("mDate").value);
    try{ await navigator.clipboard.writeText(text); }catch(e){ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
    q("copyBtn").textContent=tr("copied"); setTimeout(()=>q("copyBtn").textContent=tr("copyLine"),1500);
  };
  q("saveBtn").onclick=async()=>{
    q("saveOk").classList.add("hidden"); q("saveErr").classList.add("hidden");
    if(!curStaff){ q("saveErr").textContent=tr("pickStaff"); q("saveErr").classList.remove("hidden"); return; }
    q("saveBtn").disabled=true; q("saveBtn").textContent=tr("saving");
    const payload={ work_date:q("mDate").value, staff_email:curStaff, data:currentData(), updated_at:new Date().toISOString() };
    const { error }=await db.from("assignments").upsert(payload, { onConflict:"work_date,staff_email" });
    q("saveBtn").disabled=false; q("saveBtn").textContent=tr("save");
    if(error){ q("saveErr").textContent=tr("saveErr")+error.message; q("saveErr").classList.remove("hidden"); }
    else { q("saveBtn").classList.add("done"); q("saveOk").classList.remove("hidden"); setTimeout(()=>q("saveBtn").classList.remove("done"),1200); }
  };
  q("hLoad").onclick=loadHistory;
  q("addMem").onclick=addMember;
}

async function loadRoster(){
  const { data, error }=await db.from("staff_roster").select("*").order("created_at",{ascending:true});
  roster=(error?[]:data)||[];
  fillStaffSelect();
  renderRoster();
}
function renderRoster(){
  const host=q("rosterList"); if(!host) return; host.innerHTML="";
  if(!roster.length){ host.textContent=tr("memEmpty"); return; }
  roster.forEach(r=>{
    const row=document.createElement("div"); row.className="mrow";
    const info=document.createElement("div"); info.style.flex="1";
    info.innerHTML=`<b>${r.nickname||r.name||"(名前なし)"}</b> <span class="hint">${r.email}${r.active?"":" · 停止中"}</span>`;
    const del=document.createElement("button"); del.className="del"; del.textContent="×"; del.title="削除";
    del.onclick=async()=>{ if(!confirm(trf("delConfirm",{email:r.email}))) return; await db.from("staff_roster").delete().eq("email", r.email); loadRoster(); };
    row.append(info, del); host.appendChild(row);
  });
}
async function addMember(){
  q("memErr").classList.add("hidden");
  const email=q("newEmail").value.trim().toLowerCase();
  const name=q("newName").value.trim(), nick=q("newNick").value.trim();
  if(!email||!email.includes("@")){ q("memErr").textContent=tr("memErrMail"); q("memErr").classList.remove("hidden"); return; }
  const { error }=await db.from("staff_roster").upsert({ email, name, nickname:nick, active:true }, { onConflict:"email" });
  if(error){ q("memErr").textContent=tr("memErr")+error.message; q("memErr").classList.remove("hidden"); return; }
  q("newEmail").value=""; q("newName").value=""; q("newNick").value="";
  loadRoster();
}

async function loadHistory(){
  const d=q("hDate").value; const host=q("histList"); host.innerHTML='<div class="spin">'+tr("loading")+'</div>';
  const { data, error }=await db.from("assignments").select("*").eq("work_date", d).order("staff_email");
  if(error){ host.innerHTML='<div class="err">'+error.message+'</div>'; return; }
  if(!data||!data.length){ host.innerHTML='<div class="card">'+tr("histNone")+'</div>'; return; }
  host.innerHTML="";
  const nameOf=e=>{ const r=roster.find(x=>x.email===e); return r?(r.nickname||r.name||e):e; };
  data.forEach(a=>{
    const it=document.createElement("div"); it.className="histitem";
    it.innerHTML=`<h4>${nameOf(a.staff_email)} <span class="hint">${a.staff_email}</span></h4>`;
    const m=document.createElement("div"); m.className="msg"; m.innerHTML=renderRich(a.data, a.work_date);
    it.appendChild(m); host.appendChild(it);
  });
}

document.querySelectorAll("#langSel button").forEach(b=>{ b.onclick=()=>{ lang=b.dataset.l; localStorage.setItem("teamdcl_lang",lang); applyLang(); }; });
applyLang();
db.auth.onAuthStateChange((event, session)=>{ if(event==="SIGNED_OUT"){ location.reload(); } });
route();
</script>
